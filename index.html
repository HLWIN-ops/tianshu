<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天枢</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 进场：太极八卦开屏 -->
  <div id="intro" class="intro" role="dialog" aria-label="天枢开场">
    <div class="intro-inner">
      <div class="intro-ring-wrap">
        <svg class="intro-ring-svg" viewBox="0 0 320 320" aria-hidden="true">
          <!-- 最外圈光晕 -->
          <circle cx="160" cy="160" r="156" fill="none" stroke="rgba(232,197,106,.08)" stroke-width="2"/>
          <circle cx="160" cy="160" r="146" fill="none" stroke="rgba(232,197,106,.05)" stroke-width="1"/>
          <!-- 八卦爻符号 -->
          <g transform="translate(160,22)"><rect x="-12" y="0" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/><rect x="-12" y="6" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/><rect x="-12" y="12" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/></g>
          <g transform="translate(258,62) rotate(45)"><rect x="-10" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/><rect x="0" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/><rect x="-10" y="6" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/><rect x="-10" y="12" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/></g>
          <g transform="translate(298,160) rotate(90)"><rect x="-10" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="0" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="-10" y="6" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="-10" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="0" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/></g>
          <g transform="translate(258,258) rotate(135)"><rect x="-10" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="0" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="-10" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="0" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="-10" y="12" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/></g>
          <g transform="translate(160,298) rotate(180)"><rect x="-10" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="0" y="0" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="-10" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="0" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="-10" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/><rect x="0" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.4)"/></g>
          <g transform="translate(62,258) rotate(225)"><rect x="-10" y="0" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="-10" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="0" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="-10" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/><rect x="0" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.5)"/></g>
          <g transform="translate(22,160) rotate(270)"><rect x="-10" y="0" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/><rect x="-10" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/><rect x="0" y="6" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/><rect x="-10" y="12" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.6)"/></g>
          <g transform="translate(62,62) rotate(315)"><rect x="-10" y="0" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/><rect x="-10" y="6" width="24" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/><rect x="-10" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/><rect x="0" y="12" width="10" height="2.8" rx="1" fill="rgba(232,197,106,.7)"/></g>
        </svg>
        <!-- 中心太极：白 + 金，确保在深色背景上清晰可见 -->
        <div class="intro-taiji-box">
          <svg viewBox="-70 -70 140 140" role="img" aria-label="太极" class="intro-taiji-svg">
            <circle r="64" fill="#f5e6c8"/>
            <path d="M0,-64 A64,64 0 0,1 0,64 Z" fill="#dfb95a"/>
            <circle cx="0" cy="-32" r="32" fill="#dfb95a"/>
            <circle cx="0" cy="32" r="32" fill="#f5e6c8"/>
            <circle cx="0" cy="-32" r="8" fill="#f5e6c8"/>
            <circle cx="0" cy="32" r="8" fill="#dfb95a"/>
            <circle r="64" fill="none" stroke="rgba(245,230,200,.25)" stroke-width="1.5"/>
          </svg>
        </div>
      </div>
      <div class="intro-brand">
        <h1>天枢</h1>
        <p>知命 · 安身</p>
      </div>
      <button type="button" class="intro-skip" id="intro-skip">进入排盘</button>
    </div>
  </div>

  <div class="shell">
    <header class="masthead">
      <div class="brand">
        <svg class="taiji" viewBox="-52 -52 104 104" aria-hidden="true">
          <circle r="48" fill="currentColor"/>
          <path d="M0,-48 A48,48 0 0,1 0,48 Z" fill="var(--paper)"/>
          <circle cx="0" cy="-24" r="24" fill="currentColor"/>
          <circle cx="0" cy="24" r="24" fill="var(--paper)"/>
          <circle cx="0" cy="-24" r="6" fill="var(--paper)"/>
          <circle cx="0" cy="24" r="6" fill="currentColor"/>
          <circle r="48" fill="none" stroke="currentColor" stroke-width="1"/>
        </svg>
        <div class="brand-text">
          <h1>天枢</h1>
          <p>天干地支 · 阴阳五行 · 知命安身</p>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-page="input">录入</button>
        <button class="tab" data-page="paipan">命盘</button>
        <button class="tab" data-page="dayun">大运</button>
        <button class="tab" data-page="read">解读</button>
      </nav>
    </header>

    <main>
      <!-- 录入 -->
      <section class="page active" id="page-input">
        <p class="lede">命由天定，运由己造。请录入生辰，以推四柱。<br>融天文节气定盘、真太阳时校正、农历公历互通、神煞格局全备、分时期人生解读。</p>

        <form class="form" id="form" autocomplete="off">
          <div class="field">
            <label>姓名</label>
            <input type="text" id="f-name" placeholder="可不填" />
          </div>

          <div class="field">
            <label>性别</label>
            <div class="seg" role="radiogroup">
              <label><input type="radio" name="gender" value="male" checked><span>男命 · 乾造</span></label>
              <label><input type="radio" name="gender" value="female"><span>女命 · 坤造</span></label>
            </div>
          </div>

          <div class="field">
            <label>历法</label>
            <div class="seg">
              <label><input type="radio" name="cal" value="solar" id="cal-solar" checked><span>公历</span></label>
              <label><input type="radio" name="cal" value="lunar" id="cal-lunar"><span>农历</span></label>
            </div>
          </div>

          <div class="field leap-row" id="row-leap" hidden>
            <label>闰月</label>
            <label class="check"><input type="checkbox" id="f-leap"><span>✦ 此农历月为闰月（如闰五月、闰六月等）</span></label>
          </div>

          <div class="grid3">
            <div class="field">
              <label id="lbl-year">出生年</label>
              <input type="number" id="f-year" value="1990" min="1900" max="2100" />
            </div>
            <div class="field">
              <label id="lbl-month">出生月</label>
              <input type="number" id="f-month" value="6" min="1" max="12" />
            </div>
            <div class="field">
              <label id="lbl-day">出生日</label>
              <input type="number" id="f-day" value="15" min="1" max="31" />
            </div>
          </div>

          <div class="field">
            <label>出生时辰</label>
            <select id="f-shi" class="shichen"></select>
            <p class="hint"><span id="shi-range"></span><span id="shi-solar"></span></p>
          </div>

          <details class="advanced">
            <summary>高级 · 真太阳时 / 子时规则</summary>
            <div class="grid3">
              <div class="field">
                <label>出生经度</label>
                <div class="with-unit"><input type="number" id="f-lon" value="120" min="70" max="140" step="0.1"><span>°E</span></div>
              </div>
              <div class="field">
                <label>时区</label>
                <div class="with-unit"><input type="number" id="f-tz" value="8" min="-12" max="14"><span>UTC+</span></div>
              </div>
              <div class="field">
                <label>真太阳时</label>
                <label class="check"><input type="checkbox" id="f-tst" checked><span>启用校正</span></label>
              </div>
            </div>
            <div class="field zi-rule">
              <label>子时换日</label>
              <div class="seg" role="radiogroup">
                <label><input type="radio" name="ziRule" value="next" id="zi-next" checked><span>晚子时 · 23点后用次日</span></label>
                <label><input type="radio" name="ziRule" value="same" id="zi-same"><span>子时属当日</span></label>
              </div>
              <p class="hint">流派分歧：默认「晚子时」；若习惯夜子仍算当日，选「子时属当日」。</p>
            </div>
          </details>

          <div class="actions">
            <button type="button" class="ghost" id="btn-now">用当前时刻</button>
            <button type="submit" class="primary">开始排盘</button>
          </div>
        </form>
      </section>

      <!-- 命盘 -->
      <section class="page" id="page-paipan">
        <div class="idcard" id="idcard"></div>

        <div class="bazi-table" id="bazi-table"></div>

        <div class="chips" id="solar-note"></div>

        <div class="tri">
          <div class="tri-box">
            <h4>神煞</h4>
            <div id="shensha-list" class="tri-body"></div>
          </div>
          <div class="tri-box">
            <h4>空亡</h4>
            <div id="kongwang-list" class="tri-body"></div>
          </div>
          <div class="tri-box">
            <h4>刑冲合害</h4>
            <div id="relations-list" class="tri-body"></div>
          </div>
        </div>

        <section class="block">
          <h3 class="block-title">五行力量分布</h3>
          <div class="wx-bars" id="wx-bars"></div>
          <p class="wx-note" id="wx-note"></p>
        </section>

        <div class="jump">
          <button class="ghost" data-goto="dayun">查看大运流年 →</button>
          <button class="ghost" data-goto="read">查看命盘解读 →</button>
        </div>
      </section>

      <!-- 大运 -->
      <section class="page" id="page-dayun">
        <p class="dayun-intro" id="dayun-intro"></p>
        <h3 class="block-title">大运轨迹</h3>
        <div class="timeline" id="dayun-timeline"></div>

        <section class="block">
          <h3 class="block-title">流年</h3>
          <div class="liunian-grid" id="liunian-grid"></div>
        </section>
      </section>

      <!-- 解读 -->
      <section class="page" id="page-read">
        <div id="read-content"></div>
      </section>
    </main>

    <footer class="foot">
      <span class="seal">知命</span>
      本排盘以传统命理学为据，仅供参考，切勿迷信。
      <span class="seal">安身</span>
    </footer>
  </div>

  <script src="js/engine.js"></script>
  <script src="js/engine-plus.js"></script>
  <script src="js/interpret.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
